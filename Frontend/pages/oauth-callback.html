<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusPlace – Signing you in…</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      padding: 48px 40px;
      text-align: center;
      max-width: 380px;
      width: 90%;
    }
    .spinner-ring {
      width: 56px;
      height: 56px;
      border: 4px solid #e2e8f0;
      border-top-color: #0d9488;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
    }
    .success-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #059669, #34d399);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 20px rgba(5,150,105,0.3);
    }
    .error-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #ef4444, #f87171);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 20px rgba(239,68,68,0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner-ring" id="spinner"></div>
    <div class="success-icon" id="success-icon">✓</div>
    <div class="error-icon"   id="error-icon">✕</div>
    <h2 id="title">Completing sign-in…</h2>
    <p  id="sub">Please wait while we set up your account.</p>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);

      /* ── ERROR from backend ── */
      if (params.get('error')) {
        document.getElementById('spinner').style.display    = 'none';
        document.getElementById('error-icon').style.display = 'flex';
        document.getElementById('title').textContent = 'Sign-in failed';
        document.getElementById('sub').textContent   =
          decodeURIComponent(params.get('error') || 'Something went wrong. Please try again.');
        setTimeout(() => window.location.href = 'Signup.html', 3000);
        return;
      }

      /* ── SUCCESS from backend ── */
      const token = params.get('token');
      const role  = params.get('role')  || sessionStorage.getItem('oauthRole') || 'student';
      const name  = decodeURIComponent(params.get('name')  || '');
      const email = decodeURIComponent(params.get('email') || '');
      const id    = params.get('id') || '';

      if (!token) {
        document.getElementById('title').textContent = 'Missing token';
        document.getElementById('sub').textContent   = 'Redirecting to login…';
        setTimeout(() => window.location.href = 'Signup.html', 2000);
        return;
      }

      /* ── Save to localStorage ── */
      localStorage.setItem('authToken',  token);
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('userRole',   role);
      localStorage.setItem('userName',   name);
      localStorage.setItem('userEmail',  email);
      if (id) localStorage.setItem('userId', id);

      /* Role-specific legacy keys */
      if (role === 'company') {
        localStorage.setItem('companyName',  name);
        localStorage.setItem('companyEmail', email);
        sessionStorage.setItem('companyName',  name);
        sessionStorage.setItem('companyEmail', email);
      }
      if (role === 'student') {
        localStorage.setItem('studentName',  name);
        localStorage.setItem('studentEmail', email);
      }
      if (role === 'tpo') {
        localStorage.setItem('tpoName',  name);
        localStorage.setItem('tpoEmail', email);
      }
      sessionStorage.setItem('isLoggedIn', 'true');
      sessionStorage.setItem('userRole', role);

      /* ── Show success ── */
      document.getElementById('spinner').style.display      = 'none';
      document.getElementById('success-icon').style.display = 'flex';
      document.getElementById('title').textContent = `Welcome, ${name || 'User'}! 🎉`;
      document.getElementById('sub').textContent   = 'Account ready. Taking you to your dashboard…';

      /* ── Redirect to correct dashboard ── */
      const dashMap = {
        company: 'CompanyDashboard.html',
        student: 'StudentDashboard.html',
        tpo:     'TpoDashboard.html'
      };
      setTimeout(() => {
        window.location.href = dashMap[role] || '../index.html';
      }, 1500);
    })();
  </script>
</body>
</html>
